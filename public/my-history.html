<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My History — ClearanceIQ</title>
  <meta name="description" content="Your saved ClearanceIQ lookups.">
  <link rel="canonical" href="https://clearance-iq.com/my-history.html">
  <link rel="stylesheet" href="/style.css">
  <script defer src="/site-inject.js"></script>
</head>
<body>
<a href="#main" class="skip-link">Skip to main content</a>
<main id="main" class="container">
  <a href="/"><span class="badge">ClearanceIQ</span></a>
  <h1 style="margin-top:18px;">My History</h1>
  <p class="lead" style="margin-top:8px;">Your saved lookups from this account. Sign in (your member key is stored on this device) to see them.</p>

  <div id="gate" class="box" style="margin-top:22px; display:none;">
    <p>You're not signed in on this device. <a href="/">Sign up free</a> to start saving your lookups.</p>
  </div>

  <div id="list" class="box" style="margin-top:22px; display:none;">
    <div id="items"></div>
    <p id="empty" class="muted" style="display:none;">No lookups saved yet. Use a tool and your results will appear here.</p>
  </div>
</main>

<script>
(function(){
  function key(){ try { return localStorage.getItem('ciq_api_key') || ''; } catch(e){ return ''; } }
  function fmt(ts){
    try { return new Date(ts).toLocaleString(); } catch(e){ return ''; }
  }
  function load(){
    var k = key();
    var gate = document.getElementById('gate');
    var list = document.getElementById('list');
    if(!k){ gate.style.display='block'; return; }
    list.style.display='block';
    fetch('/api/history?limit=50', { headers: { 'x-api-key': k } })
      .then(function(r){ return r.json(); })
      .then(function(data){
        var box = document.getElementById('items');
        var empty = document.getElementById('empty');
        if(!data.ok || !data.items || !data.items.length){ empty.style.display='block'; return; }
        empty.style.display='none';
        box.innerHTML = data.items.map(function(it){
          return '<div style="border-bottom:1px solid var(--border); padding:10px 0;">'
            + '<div style="font-size:12px; color:var(--muted);">' + fmt(it.ts) + ' · ' + (it.tool||'') + '</div>'
            + '<div style="font-weight:600;">' + (it.label||it.input||'') + '</div>'
            + (it.result ? '<div style="font-size:13px; color:var(--text);">' + it.result + '</div>' : '')
            + '</div>';
        }).join('');
      })
      .catch(function(){ document.getElementById('empty').style.display='block'; });
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', load);
  else load();
})();
</script>
</body>
</html>
