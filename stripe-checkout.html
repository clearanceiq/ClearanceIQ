<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClearanceIQ — Early Access</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 16px;
    padding: 40px;
    max-width: 480px;
    width: 100%;
    text-align: center;
  }
  h1 { font-size: 24px; margin-bottom: 8px; }
  p { color: #94a3b8; margin-bottom: 24px; line-height: 1.5; }
  .price {
    font-size: 36px;
    font-weight: 800;
    color: #22c55e;
    margin-bottom: 4px;
  }
  .sub { color: #94a3b8; font-size: 13px; margin-bottom: 24px; }
  button {
    background: #22c55e;
    color: #000;
    border: none;
    padding: 14px 28px;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
  }
  button:hover { background: #16a34a; }
  .note { color: #64748b; font-size: 11px; margin-top: 16px; }
</style>

<!-- Cloudflare Web Analytics -->
<script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "f595fc18f8864d93829ac6cd51832679"}'></script>
<!-- End Cloudflare Web Analytics -->
</head>
<body>
  <div class="card">
    <h1>⚡ ClearanceIQ Early Access</h1>
    <p>Get lifetime 50% off when we publicly launch. Today you’re funding the build.</p>
    <div class="price">$1</div>
    <div class="sub">One-time · No subscription · Instant access</div>
    <button id="checkout">Support Early Access — $1</button>
    <div class="note">Secure payment via Stripe. Test mode enabled.</div>
  </div>

  <script src="https://js.stripe.com/v3/"></script>
  <script>
    // ============================================================
    // CONFIG — replace with your Stripe publishable key
    // ============================================================
    const STRIPE_PK = 'pk_test_YOUR_KEY_HERE';
    const PRICE_ID = 'price_YOUR_PRICE_ID_HERE';
    // ============================================================

    const stripe = Stripe(STRIPE_PK);
    document.getElementById('checkout').addEventListener('click', async () => {
      const { error } = await stripe.redirectToCheckout({
        lineItems: [{ price: PRICE_ID, quantity: 1 }],
        mode: 'payment',
        successUrl: window.location.origin + '/thanks.html',
        cancelUrl: window.location.origin + '/stripe-checkout.html'
      });
      if (error) alert(error.message);
    });
  </script>
</body>
</html>
